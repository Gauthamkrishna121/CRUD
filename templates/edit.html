<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRUD</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='a.css') }}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="{{ url_for('static', filename='a.js') }}"></script>
</head>
<body>
    <div class="main">
        <div class="container py-4">
            <form class="row g-4">
                <div class="col-12">
                    <h1 class="text-center">CURD Form</h1>
                </div>

                <div class="col-md-4">
                    <label for="Sa_select" class="form-label">Salutation <span class="text-danger">*</span></label>
                    <select class="form-select" id="Sa_select" required>
                        <option value="">Choose...</option>
                        <option value="mr">Mr.</option>
                        <option value="mrs">Mrs</option>
                    </select>
                </div>

                <div class="col-md-4">
                    <label for="Fname" class="form-label">First Name <span class="text-danger">*</span></label>
                    <input type="text" id="Fname" class="form-control" required>
                </div>

                <div class="col-md-4">
                    <label for="Lname" class="form-label">Last Name <span class="text-danger">*</span></label>
                    <input type="text" id="Lname" class="form-control" required>
                </div>

                <div class="col-md-6">
                    <label for="email" class="form-label">Email address <span class="text-danger">*</span></label>
                    <input type="email" class="form-control" id="email" placeholder="name@example.com" required>
                </div>

                <div class="col-md-6">
                    <label for="mobile" class="form-label">Mobile <span class="text-danger">*</span></label>
                    <input type="tel" class="form-control" id="mobile" placeholder="1234567890" pattern="[0-9]{10}" required>
                </div>

                <div class="col-md-6">
                    <label for="dob" class="form-label">Date of Birth <span class="text-danger">*</span></label>
                    <input type="date" class="form-control" id="dob" required>
                </div>

                <div class="col-md-6">
                    <span class="form-label d-block">Gender <span class="text-danger">*</span></span>
                    <div class="form-check form-check-inline">
                        <input class="form-check-input" type="radio" name="gender" id="radioDefault1" value="male" required>
                        <label class="form-check-label" for="radioDefault1">Male</label>
                    </div>
                    <div class="form-check form-check-inline">
                        <input class="form-check-input" type="radio" name="gender" id="radioDefault2" value="female">
                        <label class="form-check-label" for="radioDefault2">Female</label>
                    </div>
                </div>

                <div class="col-12 text-center">
                    <button onclick="sub()" class="btn btn-primary">Submit</button>
                </div>
            </form>
